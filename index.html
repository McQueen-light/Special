<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gov-Doc Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-6">
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-bold text-blue-400 mb-2">🛡️ AI Document Verifier</h1>
        <p class="text-gray-400 text-lg">Official Government Document Fraud Detection</p>
    </header>

    <main class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <form id="uploadForm" class="space-y-6">
            <div class="border-2 border-dashed border-gray-600 rounded-xl p-10 text-center hover:border-blue-500 transition-colors cursor-pointer" onclick="document.getElementById('fileInput').click()">
                <p class="text-gray-400">Drag & Drop or <span class="text-blue-400 underline">Browse</span></p>
                <input type="file" id="fileInput" name="document" class="hidden" accept="image/*,application/pdf">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-semibold transition-all">
                Analyze Document
            </button>
        </form>

        <div id="results" class="hidden mt-8 p-4 rounded-lg bg-gray-900 border border-gray-600">
            <h3 class="text-sm font-bold uppercase text-gray-500 mb-2">Analysis Results</h3>
            <div id="status" class="text-xl font-bold"></div>
            <p id="details" class="text-sm text-gray-400 mt-2"></p>
        </div>
    </main>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.classList.remove('hidden');
            document.getElementById('status').innerText = "Analyzing...";

            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();

            document.getElementById('status').innerText = data.is_authentic ? "✅ Authentic" : "❌ Fraud Detected";
            document.getElementById('status').className = data.is_authentic ? "text-green-400 font-bold" : "text-red-400 font-bold";
            document.getElementById('details').innerText = data.reason;
        };
    </script>
</body>
</html>
